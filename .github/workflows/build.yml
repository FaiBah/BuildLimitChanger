name: Build ARM64

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Get latest upstream version
      id: get_version
      run: |
        VERSION=$(curl -s https://api.github.com/repos/Zeuroux/BuildLimitChanger/releases/latest | jq -r .tag_name)
        echo "UPSTREAM_VERSION=$VERSION" >> $GITHUB_ENV

    - name: Clone BuildLimitChanger
      run: git clone https://github.com/Zeuroux/BuildLimitChanger.git

    - name: Set up Rust
      uses: actions-rs/toolchain@v1
      with:
        toolchain: stable
        target: aarch64-linux-android
        default: true

    - name: Install cargo-ndk
      run: cargo install cargo-ndk

    - name: Build ARM64 .so
      run: |
        cd BuildLimitChanger
        sed -i '/\[lib\]/,/crate-type/ s/^crate-type.*$/crate-type = ["cdylib"]/' Cargo.toml || true
        cargo ndk -t arm64-v8a -- build --release

    - name: Copy .so with upstream version
      run: |
        mkdir -p ../arm64-v8a
        for f in target/aarch64-linux-android/release/*.so; do
          BASENAME=$(basename "$f" .so)
          cp "$f" "../arm64-v8a/${BASENAME}-v${UPSTREAM_VERSION}.so"
        done

    - name: Commit and push
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git add arm64-v8a/*.so
        git commit -m "Update ARM64 .so v${UPSTREAM_VERSION}" || exit 0
        git push
