name: Build ARM64 .so

on:
  workflow_dispatch:  # manual trigger

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout workflow repo
      uses: actions/checkout@v4

    - name: Clone original repo
      run: git clone https://github.com/Zeuroux/BuildLimitChanger.git

    - name: Install Rust
      run: |
        curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
        source $HOME/.cargo/env
        rustup target add aarch64-linux-android

    - name: Install cargo-ndk
      run: cargo install cargo-ndk

    - name: Build ARM64 .so
      run: |
        cd BuildLimitChanger
        cargo ndk -t arm64-v8a -- build --release

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: buildlimitchanger-arm64
        path: BuildLimitChanger/target/aarch64-linux-android/release/libbuildlimitchanger.so
