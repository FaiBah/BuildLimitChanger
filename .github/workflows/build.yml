name: Build ARM64 and upload all

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repo
      uses: actions/checkout@v4

    - name: Clone upstream BuildLimitChanger
      run: git clone https://github.com/Zeuroux/BuildLimitChanger.git

    - name: Set up Rust
      uses: actions-rs/toolchain@v1
      with:
        toolchain: stable
        target: aarch64-linux-android
        default: true

    - name: Cache Rust dependencies
      uses: actions/cache@v3
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          BuildLimitChanger/target
        key: ${{ runner.os }}-cargo-${{ hashFiles('BuildLimitChanger/Cargo.lock') }}

    - name: Install cargo-ndk
      run: cargo install cargo-ndk

    - name: Build ARM64 .so
      run: |
        cd BuildLimitChanger
        sed -i '/\[lib\]/,/crate-type/ s/^crate-type.*$/crate-type = ["cdylib"]/' Cargo.toml || true
        cargo ndk -t arm64-v8a -- build --release

    - name: List build output
      run: ls -R BuildLimitChanger/target/aarch64-linux-android/release/

    - name: Upload all build files
      uses: actions/upload-artifact@v4
      with:
        name: buildlimitchanger-arm64-all
        path: BuildLimitChanger/target/aarch64-linux-android/release/
