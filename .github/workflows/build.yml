name: Build ARM64

on:
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
    # 1️⃣ Checkout repo (disable default credentials for push)
    - uses: actions/checkout@v4
      with:
        persist-credentials: false

    # 2️⃣ Clone upstream BuildLimitChanger
    - name: Clone BuildLimitChanger
      run: git clone https://github.com/Zeuroux/BuildLimitChanger.git

    # 3️⃣ Setup Rust toolchain
    - name: Set up Rust
      uses: actions-rs/toolchain@v1
      with:
        toolchain: stable
        target: aarch64-linux-android
        default: true

    # 4️⃣ Cache Rust dependencies and target folder
    - name: Cache Rust
      uses: actions/cache@v3
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          BuildLimitChanger/target
        key: ${{ runner.os }}-cargo-${{ hashFiles('BuildLimitChanger/Cargo.lock') }}

    # 5️⃣ Install cargo-ndk
    - name: Install cargo-ndk
      run: cargo install cargo-ndk

    # 6️⃣ Build ARM64 .so
    - name: Build ARM64 .so
      run: |
        cd BuildLimitChanger
        sed -i '/\[lib\]/,/crate-type/ s/^crate-type.*$/crate-type = ["cdylib"]/' Cargo.toml || true
        cargo ndk -t arm64-v8a -- build --release

    # 7️⃣ Copy .so to lib/ folder in repo
    - name: Copy .so to repo
      run: |
        mkdir -p ./lib
        cp BuildLimitChanger/target/aarch64-linux-android/release/**/*.so ./lib/

    # 8️⃣ Commit & push .so to repo
    - name: Commit and push .so
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git add lib/*.so
        git commit -m "Update ARM64 .so via workflow" || echo "No changes to commit"
        git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }} HEAD:main
