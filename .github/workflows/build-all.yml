name: Build All Targets

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Upstream version to build'
        required: true
        default: 'v1.0.0'

permissions:
  contents: write   # Needed to commit & push

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target:
          - aarch64-linux-android
          - i686-linux-android
          - x86_64-linux-android
          - x86_64-pc-windows-gnu
          - x86_64-unknown-linux-gnu

    steps:
    # 1️⃣ Checkout repo
    - uses: actions/checkout@v4

    # 2️⃣ Clone original BuildLimitChanger
    - name: Clone original BuildLimitChanger
      run: git clone https://github.com/Zeuroux/BuildLimitChanger.git

    # 3️⃣ Setup Rust
    - name: Setup Rust
      uses: actions-rs/toolchain@v1
      with:
        toolchain: stable
        target: ${{ matrix.target }}
        default: true

    # 4️⃣ Install cargo-ndk for Android
    - name: Install cargo-ndk
      if: ${{ matrix.target == 'aarch64-linux-android' || matrix.target == 'i686-linux-android' }}
      run: cargo install cargo-ndk || true

    # 5️⃣ Build target
    - name: Build target
      run: |
        VERSION=${{ github.event.inputs.version }}
        mkdir -p binaries/${VERSION}

        if [[ "${{ matrix.target }}" == "aarch64-linux-android" ]]; then
          cd BuildLimitChanger
          sed -i '/\[lib\]/,/crate-type/ s/^crate-type.*$/crate-type = ["cdylib"]/' Cargo.toml || true
          cargo ndk -t arm64-v8a -- build --release
          mkdir -p ../binaries/${VERSION}/arm64-v8a
          cp target/aarch64-linux-android/release/*.so ../binaries/${VERSION}/arm64-v8a/ || true
        elif [[ "${{ matrix.target }}" == "i686-linux-android" ]]; then
          cd BuildLimitChanger
          sed -i '/\[lib\]/,/crate-type/ s/^crate-type.*$/crate-type = ["cdylib"]/' Cargo.toml || true
          cargo ndk -t armeabi-v7a -- build --release
          mkdir -p ../binaries/${VERSION}/armeabi-v7a
          cp target/i686-linux-android/release/*.so ../binaries/${VERSION}/armeabi-v7a/ || true
        elif [[ "${{ matrix.target }}" == *"windows"* ]]; then
          cd BuildLimitChanger
          cargo build --target ${{ matrix.target }} --release
          mkdir -p ../binaries/${VERSION}/windows
          cp target/${{ matrix.target }}/release/*.dll ../binaries/${VERSION}/windows/ || true
        else
          cd BuildLimitChanger
          cargo build --target ${{ matrix.target }} --release
          mkdir -p ../binaries/${VERSION}/linux
          cp target/${{ matrix.target }}/release/*.so ../binaries/${VERSION}/linux/ || true
        fi

    # 6️⃣ Commit & push binaries
    - name: Commit and push built files
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git add binaries/${{ github.event.inputs.version }}/*
        git commit -m "Build binaries for version ${{ github.event.inputs.version }}" || echo "No changes to commit"
        git push
