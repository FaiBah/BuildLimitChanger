name: Build All Targets

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target:
          - i686-linux-android
          - x86_64-linux-android
          - aarch64-linux-android
          - x86_64-pc-windows-gnu
          - x86_64-unknown-linux-gnu
    steps:
      # 1️⃣ Checkout your fork
      - uses: actions/checkout@v4

      # 2️⃣ Clone upstream repo
      - name: Clone upstream BuildLimitChanger
        run: git clone https://github.com/Zeuroux/BuildLimitChanger.git

      # 3️⃣ Setup Rust
      - name: Setup Rust
        run: rustup update stable

      # 4️⃣ Install cross-compilation tools
      - name: Setup cross toolchain
        uses: taiki-e/setup-cross-toolchain-action@v1
        with:
          target: ${{ matrix.target }}

      # 5️⃣ Build
      - name: Build
        run: |
          cd BuildLimitChanger
          cargo build --profile release
        env:
          CARGO_PROFILE_RELEASE_LTO: "fat"
          CARGO_PROFILE_RELEASE_STRIP: "symbols"
          CARGO_PROFILE_RELEASE_CODEGEN_UNITS: 1

      # 6️⃣ Copy outputs into versioned folders
      - name: Copy binaries
        run: |
          mkdir -p ../binaries/${{ matrix.target }}
          if [[ "${{ matrix.target }}" == *"windows"* ]]; then
            cp BuildLimitChanger/target/${{ matrix.target }}/release/BuildLimitChanger.dll ../binaries/${{ matrix.target }}/
          else
            cp BuildLimitChanger/target/${{ matrix.target }}/release/libBuildLimitChanger.so ../binaries/${{ matrix.target }}/
          fi

      # 7️⃣ Push artifacts (optional)
      - uses: actions/upload-artifact@v4
        with:
          name: binaries-${{ matrix.target }}
          path: binaries/${{ matrix.target }}/
