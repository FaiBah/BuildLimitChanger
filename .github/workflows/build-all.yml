name: Build All Binaries with NDK

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-all:
    runs-on: ubuntu-latest

    steps:
    # 1️⃣ Checkout repository
    - uses: actions/checkout@v4

    # 2️⃣ Clone upstream BuildLimitChanger
    - name: Clone BuildLimitChanger
      run: git clone https://github.com/Zeuroux/BuildLimitChanger.git

    # 3️⃣ Install Android NDK
    - name: Install Android NDK
      run: |
        sudo apt update
        sudo apt install -y unzip wget
        wget https://dl.google.com/android/repository/android-ndk-r25b-linux.zip -O ndk.zip
        unzip ndk.zip -d $HOME/android-ndk
        echo "ANDROID_NDK_HOME=$HOME/android-ndk/android-ndk-r25b" >> $GITHUB_ENV
        echo "$HOME/android-ndk/android-ndk-r25b:$PATH" >> $GITHUB_ENV

    # 4️⃣ Set up Rust toolchain
    - name: Set up Rust
      uses: actions-rs/toolchain@v1
      with:
        toolchain: stable

    # 5️⃣ Add Rust targets
    - name: Add Rust targets
      run: |
        rustup target add aarch64-linux-android
        rustup target add armv7-linux-androideabi
        rustup target add x86_64-pc-windows-msvc
        rustup target add x86_64-unknown-linux-gnu

    # 6️⃣ Cache Rust dependencies
    - name: Cache Rust
      uses: actions/cache@v3
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          BuildLimitChanger/target
        key: ${{ runner.os }}-cargo-${{ hashFiles('BuildLimitChanger/Cargo.lock') }}

    # 7️⃣ Install cargo-ndk
    - name: Install cargo-ndk
      run: cargo install cargo-ndk

    # 8️⃣ Build Android ARMv7 .so (shows logs)
    - name: Build Android ARMv7 .so
      run: |
        cd BuildLimitChanger
        echo '[profile.release]' >> Cargo.toml
        echo 'lto = false' >> Cargo.toml
        echo 'debug = false' >> Cargo.toml
        echo 'codegen-units = 16' >> Cargo.toml
        cargo ndk -t armeabi-v7a -- build --release
        mkdir -p ../../binaries/android/armeabi-v7a
        cp target/armv7-linux-androideabi/release/**/*.so ../../binaries/android/armeabi-v7a/

    # 9️⃣ Build Android ARM64 .so
    - name: Build Android ARM64 .so
      run: |
        cd BuildLimitChanger
        cargo ndk -t arm64-v8a -- build --release
        mkdir -p ../../binaries/android/arm64-v8a
        cp target/aarch64-linux-android/release/**/*.so ../../binaries/android/arm64-v8a/

    # 🔟 Build Windows x64 DLL
    - name: Build Windows x64 DLL
      run: |
        cd BuildLimitChanger
        cargo build --target x86_64-pc-windows-msvc --release
        mkdir -p ../../binaries/windows/x64
        cp target/x86_64-pc-windows-msvc/release/*.dll* ../../binaries/windows/x64/

    # 1️⃣1️⃣ Build Linux x64 .so
    - name: Build Linux x64 .so
      run: |
        cd BuildLimitChanger
        cargo build --target x86_64-unknown-linux-gnu --release
        mkdir -p ../../binaries/linux/x64
        cp target/x86_64-unknown-linux-gnu/release/lib*.so ../../binaries/linux/x64/

    # 1️⃣2️⃣ Commit binaries
    - name: Commit binaries
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git add binaries
        git commit -m "Add all build binaries $(date -u +'%Y-%m-%d %H:%M:%S')" || exit 0
        git push
