name: Build All Binaries

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-all:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Clone upstream BuildLimitChanger
      run: git clone https://github.com/Zeuroux/BuildLimitChanger.git

    - name: Install Android NDK
      run: |
        sudo apt update
        sudo apt install -y unzip wget
        wget https://dl.google.com/android/repository/android-ndk-r25b-linux.zip -O ndk.zip
        unzip ndk.zip -d $HOME/android-ndk
        echo "ANDROID_NDK_HOME=$HOME/android-ndk/android-ndk-r25b" >> $GITHUB_ENV
        echo "$HOME/android-ndk/android-ndk-r25b" >> $GITHUB_PATH

    - name: Set up Rust
      uses: actions-rs/toolchain@v1
      with:
        toolchain: stable

    - name: Add Rust targets
      run: |
        rustup target add aarch64-linux-android
        rustup target add armv7-linux-androideabi
        rustup target add x86_64-pc-windows-msvc
        rustup target add x86_64-unknown-linux-gnu

    - name: Cache Rust dependencies
      uses: actions/cache@v3
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          BuildLimitChanger/target
        key: ${{ runner.os }}-cargo-${{ hashFiles('BuildLimitChanger/Cargo.lock') }}

    - name: Install cargo-ndk
      run: cargo install cargo-ndk

    # Android ARMv7
    - name: Build Android ARMv7 .so
      run: |
        cd BuildLimitChanger
        ::group::Building Android ARMv7 .so
        if ! grep -q "^\[profile.release\]" Cargo.toml; then
          echo '[profile.release]' >> Cargo.toml
          echo 'lto = false' >> Cargo.toml
          echo 'debug = false' >> Cargo.toml
          echo 'codegen-units = 16' >> Cargo.toml
        fi
        cargo ndk -t armeabi-v7a -- build --release >/dev/null 2>&1
        mkdir -p ../../binaries/android/armeabi-v7a
        cp target/armv7-linux-androideabi/release/**/*.so ../../binaries/android/armeabi-v7a/
        echo "✅ Android ARMv7 build completed"
        ::endgroup::

    # Android ARM64
    - name: Build Android ARM64 .so
      run: |
        cd BuildLimitChanger
        ::group::Building Android ARM64 .so
        cargo ndk -t arm64-v8a -- build --release >/dev/null 2>&1
        mkdir -p ../../binaries/android/arm64-v8a
        cp target/aarch64-linux-android/release/**/*.so ../../binaries/android/arm64-v8a/
        echo "✅ Android ARM64 build completed"
        ::endgroup::

    # Windows x64
    - name: Build Windows x64 DLL
      run: |
        cd BuildLimitChanger
        ::group::Building Windows x64 DLL
        cargo build --target x86_64-pc-windows-msvc --release >/dev/null 2>&1
        mkdir -p ../../binaries/windows/x64
        cp target/x86_64-pc-windows-msvc/release/*.dll* ../../binaries/windows/x64/
        echo "✅ Windows x64 build completed"
        ::endgroup::

    # Linux x64
    - name: Build Linux x64 .so
      run: |
        cd BuildLimitChanger
        ::group::Building Linux x64 .so
        cargo build --target x86_64-unknown-linux-gnu --release >/dev/null 2>&1
        mkdir -p ../../binaries/linux/x64
        cp target/x86_64-unknown-linux-gnu/release/lib*.so ../../binaries/linux/x64/
        echo "✅ Linux x64 build completed"
        ::endgroup::

    # Commit binaries
    - name: Commit binaries
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git add binaries
        git commit -m "Add all build binaries $(date -u +'%Y-%m-%d %H:%M:%S')" || exit 0
        git push
