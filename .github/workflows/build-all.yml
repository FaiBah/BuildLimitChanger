name: Release All Builds

on:
  push:
    tags:
      - "*"   # Trigger on any tag (used as version)

permissions:
  contents: write  # Needed to push files and create release

jobs:
  build:
    strategy:
      matrix:
        target:
          - i686-linux-android
          - x86_64-linux-android
          - aarch64-linux-android
          - x86_64-pc-windows-gnu
          - x86_64-unknown-linux-gnu
    runs-on: ubuntu-latest

    steps:
    # 1️⃣ Checkout repo
    - uses: actions/checkout@v4

    # 2️⃣ Clone original BuildLimitChanger
    - name: Clone original BuildLimitChanger
      run: git clone https://github.com/Zeuroux/BuildLimitChanger.git

    # 3️⃣ Setup Rust
    - name: Setup Rust
      uses: actions-rs/toolchain@v1
      with:
        toolchain: stable
        target: ${{ matrix.target }}
        default: true

    # 4️⃣ Install cargo-ndk for Android targets
    - name: Install cargo-ndk
      if: ${{ matrix.target == 'aarch64-linux-android' || matrix.target == 'i686-linux-android' }}
      run: cargo install cargo-ndk || true

    # 5️⃣ Build target
    - name: Build target
      run: |
        VERSION=${GITHUB_REF#refs/tags/}  # Tag name as version
        mkdir -p binaries/${VERSION}

        if [[ "${{ matrix.target }}" == "aarch64-linux-android" ]]; then
          cd BuildLimitChanger
          cargo ndk -t arm64-v8a -- build --release
          mkdir -p ../binaries/${VERSION}/arm64-v8a
          cp target/aarch64-linux-android/release/*.so ../binaries/${VERSION}/arm64-v8a/ || true
        elif [[ "${{ matrix.target }}" == "i686-linux-android" ]]; then
          cd BuildLimitChanger
          cargo ndk -t armeabi-v7a -- build --release
          mkdir -p ../binaries/${VERSION}/armeabi-v7a
          cp target/i686-linux-android/release/*.so ../binaries/${VERSION}/armeabi-v7a/ || true
        elif [[ "${{ matrix.target }}" == *"windows"* ]]; then
          cd BuildLimitChanger
          cargo build --target ${{ matrix.target }} --release
          mkdir -p ../binaries/${VERSION}/windows
          cp target/${{ matrix.target }}/release/*.dll ../binaries/${VERSION}/windows/ || true
        else
          cd BuildLimitChanger
          cargo build --target ${{ matrix.target }} --release
          mkdir -p ../binaries/${VERSION}/linux
          cp target/${{ matrix.target }}/release/*.so ../binaries/${VERSION}/linux/ || true
        fi

    # 6️⃣ Build Changelog
    - name: Build Changelog
      id: github_release
      uses: mikepenz/release-changelog-builder-action@v4
      with:
        commitMode: true
        configurationJson: |
          {
            "template": "{{CHANGELOG}}",
            "commit_template": "- {{message}} ({{hash}})",
            "categories": [],
            "sort": {
              "order": "ASC"
            }
          }
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    # 7️⃣ Create GitHub Release
    - name: Create Release
      uses: mikepenz/action-gh-release@v1
      with:
        body: ${{ steps.github_release.outputs.changelog }}
        files: |
          binaries/${GITHUB_REF#refs/tags/}/**/*.so
          binaries/${GITHUB_REF#refs/tags/}/**/*.dll
