name: Build All Targets

on:
  workflow_dispatch:

permissions:
  contents: write   # Needed to commit & push

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target:
          - i686-linux-android
          - x86_64-linux-android
          - aarch64-linux-android
          - x86_64-pc-windows-gnu
          - x86_64-unknown-linux-gnu

    steps:
    # 1️⃣ Checkout repo
    - uses: actions/checkout@v4

    # 2️⃣ Get latest upstream version
    - name: Get latest upstream version
      id: get_version
      run: |
        VERSION=$(curl -s https://api.github.com/repos/Zeuroux/BuildLimitChanger/releases/latest | jq -r .tag_name)
        echo "UPSTREAM_VERSION=$VERSION" >> $GITHUB_ENV
        echo "Upstream version: $VERSION"

    # 3️⃣ Clone BuildLimitChanger
    - name: Clone BuildLimitChanger
      run: git clone https://github.com/Zeuroux/BuildLimitChanger.git

    # 4️⃣ Setup Rust
    - name: Set up Rust
      uses: actions-rs/toolchain@v1
      with:
        toolchain: stable
        target: ${{ matrix.target }}
        default: true

    # 5️⃣ Install cargo-ndk (only needed for Android targets)
    - name: Install cargo-ndk
      if: startsWith(matrix.target, 'i686') || startsWith(matrix.target, 'x86_64-linux') || startsWith(matrix.target, 'aarch64-linux')
      run: cargo install cargo-ndk

    # 6️⃣ Build target
    - name: Build target
      run: |
        cd BuildLimitChanger
        if [[ "${{ matrix.target }}" == *windows* ]]; then
          cargo build --target ${{ matrix.target }} --release
        else
          # Android/Linux
          if [[ "${{ matrix.target }}" == aarch64-linux-android ]]; then
            cargo ndk -t arm64-v8a -- build --release
          elif [[ "${{ matrix.target }}" == i686-linux-android ]]; then
            cargo ndk -t armeabi-v7a -- build --release
          elif [[ "${{ matrix.target }}" == x86_64-linux-android ]]; then
            cargo ndk -t x86_64 -- build --release
          else
            cargo build --target ${{ matrix.target }} --release
          fi
        fi

    # 7️⃣ Copy binaries into versioned folder
    - name: Copy binaries
      run: |
        VERSION_DIR="../binaries/v${UPSTREAM_VERSION}/${{ matrix.target }}"
        mkdir -p $VERSION_DIR
        cd BuildLimitChanger
        if [[ "${{ matrix.target }}" == *windows* ]]; then
          cp target/${{ matrix.target }}/release/BuildLimitChanger.dll $VERSION_DIR/
        else
          cp target/${{ matrix.target }}/release/libBuildLimitChanger.so $VERSION_DIR/

    # 8️⃣ Commit & push
    - name: Commit and push
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git add ../binaries/v${UPSTREAM_VERSION}/${{ matrix.target }}/*
        git commit -m "Add binaries for ${{ matrix.target }} v${UPSTREAM_VERSION}" || exit 0
        git push
