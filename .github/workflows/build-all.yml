name: Build All Targets

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-all:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Get latest upstream version
        id: version
        run: |
          VERSION=$(curl -s https://api.github.com/repos/Zeuroux/BuildLimitChanger/releases/latest | jq -r .tag_name)
          echo "UPSTREAM_VERSION=$VERSION" >> $GITHUB_ENV
          echo "Upstream version: $VERSION"

      - name: Clone upstream BuildLimitChanger
        run: git clone https://github.com/Zeuroux/BuildLimitChanger.git

      - name: Setup Rust
        run: rustup update stable

      - name: Create binaries folder
        run: mkdir -p binaries/${UPSTREAM_VERSION}

      - name: Build i686-linux-android
        uses: taiki-e/setup-cross-toolchain-action@v1
        with:
          target: i686-linux-android
      - run: |
          cd BuildLimitChanger
          cargo build --target i686-linux-android --release
          mkdir -p ../binaries/${UPSTREAM_VERSION}/i686-linux-android
          cp target/i686-linux-android/release/*.so ../binaries/${UPSTREAM_VERSION}/i686-linux-android/

      - name: Build x86_64-linux-android
        uses: taiki-e/setup-cross-toolchain-action@v1
        with:
          target: x86_64-linux-android
      - run: |
          cd BuildLimitChanger
          cargo build --target x86_64-linux-android --release
          mkdir -p ../binaries/${UPSTREAM_VERSION}/x86_64-linux-android
          cp target/x86_64-linux-android/release/*.so ../binaries/${UPSTREAM_VERSION}/x86_64-linux-android/

      - name: Build aarch64-linux-android
        uses: taiki-e/setup-cross-toolchain-action@v1
        with:
          target: aarch64-linux-android
      - run: |
          cd BuildLimitChanger
          cargo build --target aarch64-linux-android --release
          mkdir -p ../binaries/${UPSTREAM_VERSION}/aarch64-linux-android
          cp target/aarch64-linux-android/release/*.so ../binaries/${UPSTREAM_VERSION}/aarch64-linux-android/

      - name: Build x86_64-pc-windows-gnu
        uses: taiki-e/setup-cross-toolchain-action@v1
        with:
          target: x86_64-pc-windows-gnu
      - run: |
          cd BuildLimitChanger
          cargo build --target x86_64-pc-windows-gnu --release
          mkdir -p ../binaries/${UPSTREAM_VERSION}/x86_64-pc-windows-gnu
          cp target/x86_64-pc-windows-gnu/release/*.dll ../binaries/${UPSTREAM_VERSION}/x86_64-pc-windows-gnu/

      - name: Build x86_64-unknown-linux-gnu
        run: |
          cd BuildLimitChanger
          cargo build --target x86_64-unknown-linux-gnu --release
          mkdir -p ../binaries/${UPSTREAM_VERSION}/x86_64-unknown-linux-gnu
          cp target/x86_64-unknown-linux-gnu/release/*.so ../binaries/${UPSTREAM_VERSION}/x86_64-unknown-linux-gnu/

      - name: Commit and push binaries
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add binaries/${UPSTREAM_VERSION}/*
          git commit -m "Add binaries for ${UPSTREAM_VERSION}" || echo "No changes to commit"
          git push --force-with-lease
