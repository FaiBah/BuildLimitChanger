name: Release All Builds

on:
  push:
    tags:
      - "*"   # Trigger on any tag (used as version)

permissions:
  contents: write  # Needed to push files and create release

jobs:
  build:
    strategy:
      matrix:
        target:
          - i686-linux-android
          - x86_64-linux-android
          - aarch64-linux-android
          - x86_64-pc-windows-gnu
          - x86_64-unknown-linux-gnu
    runs-on: ubuntu-latest

    steps:
    # 1️⃣ Checkout repo (your workflow, minimal)
    - uses: actions/checkout@v4

    # 2️⃣ Clone original BuildLimitChanger
    - name: Clone original BuildLimitChanger
      run: git clone https://github.com/Zeuroux/BuildLimitChanger.git

    # 3️⃣ Setup Rust
    - name: Setup Rust
      uses: actions-rs/toolchain@v1
      with:
        toolchain: stable
        target: ${{ matrix.target }}
        default: true

    # 4️⃣ Install cargo-ndk for Android
    - name: Install cargo-ndk
      if: startsWith(matrix.target, 'aarch64') || startsWith(matrix.target, 'i686')
      run: cargo install cargo-ndk || true

    # 5️⃣ Build target
    - name: Build target
      run: |
        VERSION=${GITHUB_REF#refs/tags/}  # Use tag name as version
        ARCH_FOLDER=""
        SRC_FOLDER=""
        if [[ "${{ matrix.target }}" == "aarch64-linux-android" ]]; then
          cd BuildLimitChanger
          cargo ndk -t arm64-v8a -- build --release
          ARCH_FOLDER="arm64-v8a"
          SRC_FOLDER="target/aarch64-linux-android/release"
        elif [[ "${{ matrix.target }}" == "i686-linux-android" ]]; then
          cd BuildLimitChanger
          cargo ndk -t armeabi-v7a -- build --release
          ARCH_FOLDER="armeabi-v7a"
          SRC_FOLDER="target/i686-linux-android/release"
        elif [[ "${{ matrix.target }}" == *"windows"* ]]; then
          cd BuildLimitChanger
          cargo build --target ${{ matrix.target }} --release
          ARCH_FOLDER="windows"
          SRC_FOLDER="target/${{ matrix.target }}/release"
        else
          cd BuildLimitChanger
          cargo build --target ${{ matrix.target }} --release
          ARCH_FOLDER="linux"
          SRC_FOLDER="target/${{ matrix.target }}/release"
        fi

        mkdir -p ../binaries/${VERSION}/${ARCH_FOLDER}
        cp $SRC_FOLDER/*.{so,dll} ../binaries/${VERSION}/${ARCH_FOLDER}/ || true

    # 6️⃣ Build Changelog
    - name: Build Changelog
      id: github_release
      uses: mikepenz/release-changelog-builder-action@v4
      with:
        commitMode: true
        configurationJson: |
          {
            "template": "{{CHANGELOG}}",
            "commit_template": "- {{message}} ({{hash}})",
            "categories": [],
            "sort": {
              "order": "ASC"
            }
          }
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    # 7️⃣ Create Release
    - name: Create GitHub Release
      uses: mikepenz/action-gh-release@v1
      with:
        body: ${{ steps.github_release.outputs.changelog }}
        files: binaries/${GITHUB_REF#refs/tags/}/**/*.so
               binaries/${GITHUB_REF#refs/tags/}/**/*.dll
