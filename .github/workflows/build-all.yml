name: Build All Targets

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-all:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # 1️⃣ Get latest upstream version
      - name: Get latest upstream version
        id: version
        run: |
          VERSION=$(curl -s https://api.github.com/repos/Zeuroux/BuildLimitChanger/releases/latest | jq -r .tag_name)
          VERSION=${VERSION#v}  # remove leading 'v' if exists
          echo "UPSTREAM_VERSION=$VERSION" >> $GITHUB_ENV
          echo "Upstream version: $VERSION"

      # 2️⃣ Clone upstream
      - name: Clone upstream BuildLimitChanger
        run: git clone https://github.com/Zeuroux/BuildLimitChanger.git

      # 3️⃣ Setup Rust
      - name: Setup Rust
        run: rustup update stable

      # 4️⃣ Build i686-linux-android
      - name: Build i686-linux-android
        uses: taiki-e/setup-cross-toolchain-action@v1
        with:
          target: i686-linux-android
      - run: |
          cd BuildLimitChanger
          cargo build --target i686-linux-android --release
          mkdir -p ../binaries/v${UPSTREAM_VERSION}/i686-linux-android
          cp target/i686-linux-android/release/*.so ../binaries/v${UPSTREAM_VERSION}/i686-linux-android/

      # 5️⃣ Build x86_64-linux-android
      - name: Build x86_64-linux-android
        uses: taiki-e/setup-cross-toolchain-action@v1
        with:
          target: x86_64-linux-android
      - run: |
          cd BuildLimitChanger
          cargo build --target x86_64-linux-android --release
          mkdir -p ../binaries/v${UPSTREAM_VERSION}/x86_64-linux-android
          cp target/x86_64-linux-android/release/*.so ../binaries/v${UPSTREAM_VERSION}/x86_64-linux-android/

      # 6️⃣ Build aarch64-linux-android
      - name: Build aarch64-linux-android
        uses: taiki-e/setup-cross-toolchain-action@v1
        with:
          target: aarch64-linux-android
      - run: |
          cd BuildLimitChanger
          cargo build --target aarch64-linux-android --release
          mkdir -p ../binaries/v${UPSTREAM_VERSION}/aarch64-linux-android
          cp target/aarch64-linux-android/release/*.so ../binaries/v${UPSTREAM_VERSION}/aarch64-linux-android/

      # 7️⃣ Build x86_64-pc-windows-gnu
      - name: Build x86_64-pc-windows-gnu
        uses: taiki-e/setup-cross-toolchain-action@v1
        with:
          target: x86_64-pc-windows-gnu
      - run: |
          cd BuildLimitChanger
          cargo build --target x86_64-pc-windows-gnu --release
          mkdir -p ../binaries/v${UPSTREAM_VERSION}/x86_64-pc-windows-gnu
          cp target/x86_64-pc-windows-gnu/release/*.dll ../binaries/v${UPSTREAM_VERSION}/x86_64-pc-windows-gnu/

      # 8️⃣ Build x86_64-unknown-linux-gnu
      - name: Build x86_64-unknown-linux-gnu
        run: |
          cd BuildLimitChanger
          cargo build --target x86_64-unknown-linux-gnu --release
          mkdir -p ../binaries/v${UPSTREAM_VERSION}/x86_64-unknown-linux-gnu
          cp target/x86_64-unknown-linux-gnu/release/*.so ../binaries/v${UPSTREAM_VERSION}/x86_64-unknown-linux-gnu/

      # 9️⃣ Commit and push binaries
      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add binaries/v${UPSTREAM_VERSION}/*
          git commit -m "Add binaries for v${UPSTREAM_VERSION}" || echo "No changes to commit"
          git push --force-with-lease
