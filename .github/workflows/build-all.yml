name: Build All Targets

on:
  workflow_dispatch:

permissions:
  contents: write  # Needed to push files

jobs:
  build-all:
    runs-on: ubuntu-latest
    steps:
      # 1️⃣ Checkout your fork
      - uses: actions/checkout@v4

      # 2️⃣ Get latest upstream version
      - name: Get latest upstream version
        id: version
        run: |
          VERSION=$(curl -s https://api.github.com/repos/Zeuroux/BuildLimitChanger/releases/latest | jq -r .tag_name)
          echo "UPSTREAM_VERSION=$VERSION" >> $GITHUB_ENV
          echo "Upstream version: $VERSION"

      # 3️⃣ Clone upstream repository
      - name: Clone upstream BuildLimitChanger
        run: git clone https://github.com/Zeuroux/BuildLimitChanger.git

      # 4️⃣ Setup Rust
      - name: Setup Rust
        run: rustup update stable

      # 5️⃣ Define target list
      - name: Set targets
        run: |
          echo "TARGETS=i686-linux-android x86_64-linux-android aarch64-linux-android x86_64-pc-windows-gnu x86_64-unknown-linux-gnu" >> $GITHUB_ENV

      # 6️⃣ Build each target one by one
      - name: Build targets
        run: |
          for TARGET in $TARGETS; do
            echo "=== Building $TARGET ==="
            # Install cross-compilation tools for this target
            if [[ "$TARGET" == *"windows"* ]] || [[ "$TARGET" == *"linux"* ]]; then
              echo "Setup cross toolchain for $TARGET"
              curl -s https://raw.githubusercontent.com/taiki-e/setup-cross-toolchain-action/main/install.sh | bash -s $TARGET
            fi

            cd BuildLimitChanger
            cargo build --target $TARGET --profile release \
              CARGO_PROFILE_RELEASE_LTO="fat" \
              CARGO_PROFILE_RELEASE_STRIP="symbols" \
              CARGO_PROFILE_RELEASE_CODEGEN_UNITS="1"

            cd ..

            # Prepare folder
            mkdir -p v${UPSTREAM_VERSION}/$TARGET

            # Copy binary if exists
            if [[ "$TARGET" == *"windows"* ]]; then
              BIN_PATH="BuildLimitChanger/target/$TARGET/release/BuildLimitChanger.dll"
            else
              BIN_PATH="BuildLimitChanger/target/$TARGET/release/libBuildLimitChanger.so"
            fi

            if [[ -f "$BIN_PATH" ]]; then
              cp "$BIN_PATH" v${UPSTREAM_VERSION}/$TARGET/
              echo "Copied $BIN_PATH to v${UPSTREAM_VERSION}/$TARGET/"
            else
              echo "No binary found for $TARGET, skipping"
            fi
          done

      # 7️⃣ Commit & push existing binaries only
      - name: Commit and push binaries
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          FILES=$(find v${UPSTREAM_VERSION} -type f -name "*.so" -o -name "*.dll")
          if [[ -n "$FILES" ]]; then
            git add $FILES
            git commit -m "Add binaries for ${UPSTREAM_VERSION}" || echo "No changes to commit"
            git push
          else
            echo "No binaries to commit"
